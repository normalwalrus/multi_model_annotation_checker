          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    volumes:
      - $PWD:/asr-eval
      - ${PRETRAINED_MODELS_PATH}:/asr-eval/pretrained_models
      - ${BENCHMARK_DATASET_PATH}:/asr-eval/data
      - ./code:/asr-eval/code
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 16gb

  parakeet:
    stdin_open: true
    tty: true
    container_name: parakeet
    image: asr-eval/parakeet:1.0.0
